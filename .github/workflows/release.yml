name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: |
          echo "=== Building xxsqls ==="
          go build -v -o xxsqls ./cmd/xxsqls 2>&1 || exit 1
          echo "=== Building xxsqlc ==="
          go build -v -o xxsqlc ./cmd/xxsqlc 2>&1 || exit 1
          ls -la xxsqls xxsqlc

      - name: Create archive
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          tar -czvf xxsql-${VERSION}-linux-amd64.tar.gz xxsqls xxsqlc

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: xxsql-*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}