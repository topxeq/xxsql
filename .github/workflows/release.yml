name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        run: |
          go version
          go build -v -o xxsqls ./cmd/xxsqls
          go build -v -o xxsqlc ./cmd/xxsqlc
          ls -la xxsqls xxsqlc

      - name: Create archive
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          tar -czvf xxsql-${VERSION}-linux-amd64.tar.gz xxsqls xxsqlc

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: xxsql-*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}