name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Verify checkout
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Git status ==="
          git status
          echo "=== Git log ==="
          git log --oneline -3
          echo "=== Files ==="
          find . -name "*.go" | head -20
          echo "=== go.mod ==="
          cat go.mod
          echo "=== Try list packages ==="
          go list ./... 2>&1 || echo "go list failed"

      - name: Build
        run: |
          set -x
          go build -v ./cmd/xxsqls 2>&1
          go build -v ./cmd/xxsqlc 2>&1
          ls -la

      - name: Create archive
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          tar -czvf xxsql-${VERSION}-linux-amd64.tar.gz xxsqls xxsqlc

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: xxsql-*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}