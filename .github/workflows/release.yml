name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Download dependencies
        run: go mod download
      - name: Build
        run: |
          echo "=== Building all packages ==="
          go build -v ./... 2>&1 || echo "Build completed with errors"
          echo "=== Looking for executables ==="
          find . -type f -executable -name "xxsql*" 2>&1 || true
          echo "=== Listing cmd directories ==="
          ls -la cmd/xxsqls/ 2>&1 || true
          ls -la cmd/xxsqlc/ 2>&1 || true
          echo "=== Listing current directory ==="
          ls -la 2>&1 || true
      - name: Archive
        run: |
          # Find and copy executables
          find . -type f -executable -name "xxsql*" -exec cp {} . \; 2>&1 || true
          ls -la xxsqls xxsqlc 2>&1 || echo "Executables not found"
          tar -czvf xxsql-${{ github.ref_name }}-linux-amd64.tar.gz xxsqls xxsqlc 2>&1 || echo "Archive failed"
      - uses: softprops/action-gh-release@v1
        with:
          files: xxsql-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}