name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Download dependencies
        run: go mod download
      - name: Build packages step by step
        run: |
          echo "=== Building all packages ==="
          go build -v ./... 2>&1 && echo "SUCCESS" || echo "FAILED"
      - name: Build binaries
        run: |
          echo "=== Building xxsqls ==="
          go build -v ./cmd/xxsqls 2>&1
          echo "=== Building xxsqlc ==="
          go build -v ./cmd/xxsqlc 2>&1
          ls -la xxsqls xxsqlc
      - name: Archive
        run: tar -czvf xxsql-${{ github.ref_name }}-linux-amd64.tar.gz xxsqls xxsqlc
      - uses: softprops/action-gh-release@v1
        with:
          files: xxsql-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}