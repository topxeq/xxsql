name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Go manually
        run: |
          wget -q https://go.dev/dl/go1.22.0.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf go1.22.0.linux-amd64.tar.gz
          /usr/local/go/bin/go version
          /usr/local/go/bin/go env

      - name: Download dependencies
        run: /usr/local/go/bin/go mod download

      - name: Build all packages
        run: /usr/local/go/bin/go build -v ./...

      - name: Build server binary
        run: /usr/local/go/bin/go build -v -o xxsqls ./cmd/xxsqls

      - name: Build client binary
        run: /usr/local/go/bin/go build -v -o xxsqlc ./cmd/xxsqlc

      - name: Verify binaries
        run: ls -la xxsqls xxsqlc

      - name: Create archive
        run: tar -czvf xxsql-${{ github.ref_name }}-linux-amd64.tar.gz xxsqls xxsqlc

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: xxsql-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}