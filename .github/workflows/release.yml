name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Verify checkout
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Files ==="
          ls -la
          echo "=== go.mod ==="
          cat go.mod
          echo "=== internal directories ==="
          ls -la internal/ || true

      - name: Build server
        run: go build -v -o xxsqls ./cmd/xxsqls

      - name: Build client
        run: go build -v -o xxsqlc ./cmd/xxsqlc

      - name: Verify binaries
        run: ls -la xxsqls xxsqlc

      - name: Create archive
        run: tar -czvf xxsql-${{ github.ref_name }}-linux-amd64.tar.gz xxsqls xxsqlc

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: xxsql-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}