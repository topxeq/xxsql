name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Go manually
        run: |
          wget -q https://go.dev/dl/go1.22.0.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf go1.22.0.linux-amd64.tar.gz
          /usr/local/go/bin/go version

      - name: Debug
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== ls -la ==="
          ls -la
          echo "=== go.mod ==="
          cat go.mod
          echo "=== go list packages ==="
          /usr/local/go/bin/go list ./... || true

      - name: Build server
        run: /usr/local/go/bin/go build -v -o xxsqls ./cmd/xxsqls

      - name: Build client
        run: /usr/local/go/bin/go build -v -o xxsqlc ./cmd/xxsqlc

      - name: Verify binaries
        run: ls -la xxsqls xxsqlc

      - name: Create archive
        run: tar -czvf xxsql-${{ github.ref_name }}-linux-amd64.tar.gz xxsqls xxsqlc

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: xxsql-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}