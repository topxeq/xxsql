name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Debug environment
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Go version ==="
          go version
          echo "=== Go environment ==="
          go env
          echo "=== Files ==="
          ls -la
          echo "=== go.mod ==="
          cat go.mod
      - name: Download dependencies
        run: go mod download
      - name: Build
        run: |
          go build -v -o xxsqls ./cmd/xxsqls
          go build -v -o xxsqlc ./cmd/xxsqlc
          ls -la xxsqls xxsqlc
      - name: Archive
        run: tar -czvf xxsql-${{ github.ref_name }}-linux-amd64.tar.gz xxsqls xxsqlc
      - uses: softprops/action-gh-release@v1
        with:
          files: xxsql-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}