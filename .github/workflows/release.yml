name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ''
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            ext: ''
          # macOS
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            ext: ''
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: ''
          # Windows
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: '.exe'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Get version
        id: version
        shell: bash
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Build server
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p build
          echo "Building xxsqls for $GOOS/$GOARCH..."
          go version
          go env GOOS GOARCH
          go build -v -o build/xxsqls${{ matrix.ext }} ./cmd/xxsqls

      - name: Build client
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          echo "Building xxsqlc for $GOOS/$GOARCH..."
          go build -v -o build/xxsqlc${{ matrix.ext }} ./cmd/xxsqlc

      - name: Create archive
        shell: bash
        run: |
          cd build
          ARCHIVE_NAME=xxsql-${{ steps.version.outputs.VERSION }}-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a ../${ARCHIVE_NAME}.zip xxsqls${{ matrix.ext }} xxsqlc${{ matrix.ext }}
          else
            tar -czvf ../${ARCHIVE_NAME}.tar.gz xxsqls${{ matrix.ext }} xxsqlc${{ matrix.ext }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xxsql-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Generate changelog
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          echo "## Changes" >> changelog.md
          echo "" >> changelog.md

          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:"- %s" $PREV_TAG..HEAD >> changelog.md
          else
            git log --pretty=format:"- %s" -20 >> changelog.md
          fi

          echo "" >> changelog.md
          echo "" >> changelog.md
          echo "## Downloads" >> changelog.md
          echo "" >> changelog.md
          echo "| Platform | Architecture | Download |" >> changelog.md
          echo "|----------|-------------|----------|" >> changelog.md
          echo "| Linux | amd64 | \`xxsql-${VERSION}-linux-amd64.tar.gz\` |" >> changelog.md
          echo "| Linux | arm64 | \`xxsql-${VERSION}-linux-arm64.tar.gz\` |" >> changelog.md
          echo "| macOS | amd64 (Intel) | \`xxsql-${VERSION}-darwin-amd64.tar.gz\` |" >> changelog.md
          echo "| macOS | arm64 (Apple Silicon) | \`xxsql-${VERSION}-darwin-arm64.tar.gz\` |" >> changelog.md
          echo "| Windows | amd64 | \`xxsql-${VERSION}-windows-amd64.zip\` |" >> changelog.md
          echo "" >> changelog.md
          echo "## Usage" >> changelog.md
          echo "" >> changelog.md
          echo "\`\`\`bash" >> changelog.md
          echo "# Linux/macOS" >> changelog.md
          echo "tar -xzf xxsql-${VERSION}-linux-amd64.tar.gz" >> changelog.md
          echo "./xxsqls -data-dir ./data" >> changelog.md
          echo "" >> changelog.md
          echo "# Windows" >> changelog.md
          echo "# Extract the zip file" >> changelog.md
          echo "xxsqls.exe -data-dir ./data" >> changelog.md
          echo "\`\`\`" >> changelog.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: changelog.md
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}