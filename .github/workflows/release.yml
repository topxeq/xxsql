name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ''
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            ext: ''
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            ext: ''
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: ''
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: '.exe'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build server
        run: go build -v -o xxsqls${{ matrix.ext }} ./cmd/xxsqls

      - name: Build client
        run: go build -v -o xxsqlc${{ matrix.ext }} ./cmd/xxsqlc

      - name: Create archive
        shell: bash
        run: |
          ARCHIVE_NAME=xxsql-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a ../${ARCHIVE_NAME}.zip xxsqls${{ matrix.ext }} xxsqlc${{ matrix.ext }}
          else
            tar -czvf ../${ARCHIVE_NAME}.tar.gz xxsqls${{ matrix.ext }} xxsqlc${{ matrix.ext }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xxsql-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}