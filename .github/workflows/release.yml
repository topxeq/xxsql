name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Test
        run: |
          echo "Testing basic Go functionality"
          go version
          go env
          echo "Files in current directory:"
          ls -la
          echo "Files in cmd directory:"
          ls -la cmd/
          echo "Go module info:"
          cat go.mod
          echo "Listing all packages:"
          go list ./... 2>&1 || true
          echo "Attempting to build a test file..."
          echo 'package main; import "fmt"; func main() { fmt.Println("test") }' > /tmp/test.go
          go build -o /tmp/test /tmp/test.go 2>&1 || true
          /tmp/test 2>&1 || true
      - name: Build
        run: |
          go build -v -o xxsqls ./cmd/xxsqls 2>&1 || exit 1
          go build -v -o xxsqlc ./cmd/xxsqlc 2>&1 || exit 1
      - name: Archive
        run: tar -czvf xxsql-${{ github.ref_name }}-linux-amd64.tar.gz xxsqls xxsqlc
      - uses: softprops/action-gh-release@v1
        with:
          files: xxsql-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}