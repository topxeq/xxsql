name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Debug
        run: |
          go version
          go env
      - name: Download dependencies
        run: go mod download
      - name: Build packages step by step
        run: |
          echo "=== Building pkg/errors ==="
          go build -v ./pkg/errors 2>&1
          echo "=== Building internal/config ==="
          go build -v ./internal/config 2>&1
          echo "=== Building internal/log ==="
          go build -v ./internal/log 2>&1
          echo "=== Building internal/storage/types ==="
          go build -v ./internal/storage/types 2>&1
          echo "=== Building internal/storage ==="
          go build -v ./internal/storage 2>&1
          echo "=== Building internal/sql ==="
          go build -v ./internal/sql 2>&1
          echo "=== Building internal/executor ==="
          go build -v ./internal/executor 2>&1
          echo "=== Building internal/server ==="
          go build -v ./internal/server 2>&1
          echo "=== Building cmd/xxsqls ==="
          go build -v ./cmd/xxsqls 2>&1
          echo "=== Building cmd/xxsqlc ==="
          go build -v ./cmd/xxsqlc 2>&1
      - name: Final build
        run: |
          go build -o xxsqls ./cmd/xxsqls
          go build -o xxsqlc ./cmd/xxsqlc
          ls -la xxsqls xxsqlc
      - name: Archive
        run: tar -czvf xxsql-${{ github.ref_name }}-linux-amd64.tar.gz xxsqls xxsqlc
      - uses: softprops/action-gh-release@v1
        with:
          files: xxsql-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}