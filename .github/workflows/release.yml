name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Debug environment
        run: |
          echo "=== Go version ==="
          go version
          echo "=== Go environment ==="
          go env
          echo "=== Working directory ==="
          pwd
          echo "=== Files ==="
          ls -la
          echo "=== cmd/xxsqls ==="
          ls -la cmd/xxsqls || echo "cmd/xxsqls not found"
          echo "=== go.mod ==="
          cat go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: |
          echo "=== Building xxsqls ==="
          go build -v -x -o xxsqls ./cmd/xxsqls 2>&1
          echo "=== Building xxsqlc ==="
          go build -v -x -o xxsqlc ./cmd/xxsqlc 2>&1
          ls -la xxsqls xxsqlc

      - name: Create archive
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          tar -czvf xxsql-${VERSION}-linux-amd64.tar.gz xxsqls xxsqlc

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: xxsql-*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}