name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Debug
        run: |
          echo "=== Go version ==="
          go version
          echo "=== Go env ==="
          go env
          echo "=== Files ==="
          ls -la
          echo "=== go.mod ==="
          cat go.mod
          echo "=== go.sum ==="
          cat go.sum
      - name: Download dependencies
        run: go mod download
      - name: Try building a single package
        run: |
          echo "=== Building pkg/errors ==="
          go build -v ./pkg/errors 2>&1 || true
          echo "=== Building internal/config ==="
          go build -v ./internal/config 2>&1 || true
      - name: Build
        run: |
          go build -v -o xxsqls ./cmd/xxsqls 2>&1 || exit 1
          go build -v -o xxsqlc ./cmd/xxsqlc 2>&1 || exit 1
          ls -la xxsqls xxsqlc
      - name: Archive
        run: tar -czvf xxsql-${{ github.ref_name }}-linux-amd64.tar.gz xxsqls xxsqlc
      - uses: softprops/action-gh-release@v1
        with:
          files: xxsql-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}