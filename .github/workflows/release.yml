name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Download dependencies
        run: go mod download
      - name: Build
        run: |
          echo "=== Building xxsqls ==="
          go build -v -o xxsqls ./cmd/xxsqls
          echo "=== Building xxsqlc ==="
          go build -v -o xxsqlc ./cmd/xxsqlc
          echo "=== Checking executables ==="
          ls -la xxsqls xxsqlc
          file xxsqls xxsqlc
      - name: Archive
        run: |
          tar -czvf xxsql-${{ github.ref_name }}-linux-amd64.tar.gz xxsqls xxsqlc
          ls -la xxsql-*.tar.gz
      - uses: softprops/action-gh-release@v1
        with:
          files: xxsql-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}