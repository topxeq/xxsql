name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Test basic Go
        run: |
          go version
          go env GOROOT GOPATH GOCACHE
          mkdir -p /tmp/testpkg
          printf 'package testpkg\nfunc Test() {}\n' > /tmp/testpkg/test.go
          cd /tmp/testpkg
          go build -v . || echo "Test package build failed"
      - name: Build
        run: |
          go build -v -o xxsqls ./cmd/xxsqls 2>&1
          go build -v -o xxsqlc ./cmd/xxsqlc 2>&1
          ls -la xxsqls xxsqlc
      - name: Archive
        run: tar -czvf xxsql-${{ github.ref_name }}-linux-amd64.tar.gz xxsqls xxsqlc
      - uses: softprops/action-gh-release@v1
        with:
          files: xxsql-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}