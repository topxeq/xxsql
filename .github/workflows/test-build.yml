name: Test Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Create simple Go file
        run: |
          mkdir -p test
          cat > test/main.go << 'EOF'
          package main
          import "fmt"
          func main() {
              fmt.Println("Hello, World!")
          }
          EOF

      - name: Build
        run: |
          cd test
          go build -v .
          ls -la
          ./test

  build-repo:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: List files
        run: |
          ls -la
          ls -la cmd/

      - name: Build
        run: |
          go build -v ./cmd/xxsqls 2>&1
          ls -la