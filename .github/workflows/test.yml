name: Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Debug
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== ls -la ==="
          ls -la
          echo "=== go.mod ==="
          cat go.mod
          echo "=== internal directories ==="
          ls -la internal/ || true

      - name: Run tests
        run: go test ./... -v -race -count=1

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Build server
        run: go build -v -o bin/xxsqls ./cmd/xxsqls

      - name: Build client
        run: go build -v -o bin/xxsqlc ./cmd/xxsqlc